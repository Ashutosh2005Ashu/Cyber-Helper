version: '3.8'

services:
  postgres:
    image: postgres:16.4
    container_name: cyber-helper-postgres
    environment:
      POSTGRES_DB: cyber_helper_db
      POSTGRES_USER: cyber_user
      POSTGRES_PASSWORD: cyber_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cyber_user -d cyber_helper_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:

networks:
  cyber-network:
    driver: bridge
