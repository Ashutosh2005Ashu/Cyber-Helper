spring:
  application:
    name: cyber-helper-backend

  datasource:
    url: jdbc:postgresql://localhost:5432/cyber_helper_db
    username: cyber_user
    password: cyber_password
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        use_sql_comments: true
    show-sql: false
    open-in-view: false

  security:
    user:
      name: admin
      password: admin

server:
  port: 8080
  servlet:
    context-path: /api


logging:
  level:
    root: INFO
    com.ashutosh.cyberhelper: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

jwt:
  secret: cyber-helper-super-secret-key-min-32-chars-required-for-security
  expiration: 3600000