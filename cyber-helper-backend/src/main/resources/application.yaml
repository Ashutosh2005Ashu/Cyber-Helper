spring:
  application:
    name: cyber-helper-backend

  datasource:
    url: jdbc:postgresql://localhost:5432/cyber_helper_db
    username: cyber_user
    password: cyber_password
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        use_sql_comments: true
    show-sql: false
    open-in-view: false

  security:
    user:
      name: admin
      password: admin

  # Week 5: Run the pgvector extension DDL before Hibernate creates tables.
  # Spring will execute this file once on startup (idempotent — uses IF NOT EXISTS).
  sql:
    init:
      mode: always
      schema-locations: classpath:db/pgvector-init.sql

server:
  port: 8080
  servlet:
    context-path: /api


logging:
  level:
    root: INFO
    com.ashutosh.cyberhelper: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

jwt:
  secret: cyber-helper-super-secret-key-min-32-chars-required-for-security
  expiration: 3600000

app:
  storage:
    upload-dir: storage/uploads/sebi
  # Week 5: Chunking strategy config
  chunking:
    # Target size of each text chunk in characters (~200 tokens for nomic-embed-text)
    chunk-size: 800
    # Overlap between consecutive chunks so context is not lost at boundaries
    overlap: 150
